name: Build

on:
  push:
    branches: [main]
  pull_request:

env:
  GODOT_VERSION: "4.6.1"
  GODOT_RELEASE: "4.6.1-stable"
  # Godot installs templates under <version>.<channel> (with a dot), but
  # release URLs use <version>-<channel> (with a hyphen). Keep both.
  GODOT_TEMPLATE_DIR: "4.6.1.stable"

jobs:
  test:
    name: Headless GUT tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/godot
          key: godot-${{ env.GODOT_RELEASE }}-linux

      - name: Install Godot ${{ env.GODOT_RELEASE }}
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
          sudo mv "Godot_v${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Import project (populate class_name registry)
        run: |
          godot --headless --path . --import 2>&1 | tail -20 || true

      - name: Run GUT
        run: |
          godot --headless --path . -s addons/gut/gut_cmdln.gd \
            -gdir=res://game/tests/ -ginclude_subdirs -gexit

  build-windows:
    name: Windows export (debug)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Godot binary
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/godot
          key: godot-${{ env.GODOT_RELEASE }}-linux

      - name: Cache export templates
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot/export_templates/${{ env.GODOT_TEMPLATE_DIR }}
          key: godot-templates-${{ env.GODOT_RELEASE }}

      - name: Ensure Godot binary
        run: |
          set -euxo pipefail
          if [ ! -x /usr/local/bin/godot ]; then
            wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
            unzip -q "Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
            sudo mv "Godot_v${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot
            sudo chmod +x /usr/local/bin/godot
          fi

      - name: Install export templates
        run: |
          set -euxo pipefail
          if [ ! -d "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_DIR}" ]; then
            wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_export_templates.tpz"
            mkdir -p "$HOME/.local/share/godot/export_templates"
            unzip -q "Godot_v${GODOT_RELEASE}_export_templates.tpz" -d /tmp/templates
            mv /tmp/templates/templates "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_DIR}"
          fi

      - name: Import project
        run: godot --headless --path . --import 2>&1 | tail -10 || true

      - name: Export Windows Desktop (debug)
        run: |
          mkdir -p exports/windows
          godot --headless --path . --export-debug "Windows Desktop" exports/windows/IdleBeastPractices.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-debug
          path: exports/windows

  build-web:
    name: Web export (debug)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Godot binary
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/godot
          key: godot-${{ env.GODOT_RELEASE }}-linux

      - name: Cache export templates
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot/export_templates/${{ env.GODOT_TEMPLATE_DIR }}
          key: godot-templates-${{ env.GODOT_RELEASE }}

      - name: Ensure Godot binary
        run: |
          set -euxo pipefail
          if [ ! -x /usr/local/bin/godot ]; then
            wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
            unzip -q "Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
            sudo mv "Godot_v${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot
            sudo chmod +x /usr/local/bin/godot
          fi

      - name: Install export templates
        run: |
          set -euxo pipefail
          if [ ! -d "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_DIR}" ]; then
            wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_export_templates.tpz"
            mkdir -p "$HOME/.local/share/godot/export_templates"
            unzip -q "Godot_v${GODOT_RELEASE}_export_templates.tpz" -d /tmp/templates
            mv /tmp/templates/templates "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_DIR}"
          fi

      - name: Import project
        run: godot --headless --path . --import 2>&1 | tail -10 || true

      - name: Export Web (debug)
        run: |
          mkdir -p exports/web
          godot --headless --path . --export-debug "Web" exports/web/index.html

      - uses: actions/upload-artifact@v4
        with:
          name: web-debug
          path: exports/web

  build-android-debug:
    name: Android debug APK
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0 ndk;23.2.8568313"

      - name: Cache Godot binary
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/godot
          key: godot-${{ env.GODOT_RELEASE }}-linux

      - name: Cache export templates
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot/export_templates/${{ env.GODOT_TEMPLATE_DIR }}
          key: godot-templates-${{ env.GODOT_RELEASE }}

      - name: Ensure Godot binary
        run: |
          set -euxo pipefail
          if [ ! -x /usr/local/bin/godot ]; then
            wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
            unzip -q "Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
            sudo mv "Godot_v${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot
            sudo chmod +x /usr/local/bin/godot
          fi

      - name: Install export templates
        run: |
          set -euxo pipefail
          if [ ! -d "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_DIR}" ]; then
            wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_export_templates.tpz"
            mkdir -p "$HOME/.local/share/godot/export_templates"
            unzip -q "Godot_v${GODOT_RELEASE}_export_templates.tpz" -d /tmp/templates
            mv /tmp/templates/templates "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_DIR}"
          fi

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" \
            -storepass android -keypass android

      - name: Install Android gradle build template
        # export_presets.cfg has gradle_build=true so Godot needs the
        # android_source.zip extracted into the project's android/build/
        # AND an android/.build_version marker (the GUI's Install Android
        # Build Template writes this; without it, export fails with "no
        # version info for it exists").
        #
        # Also append a gradle hook to patch the merged manifest's
        # resizeableActivity attribute to "false". See release.yml's
        # equivalent step for the full rationale (foldable orientation
        # lock); short version: Godot hardcodes resizeableActivity=true
        # which makes Android 12+ large screens ignore screenOrientation.
        run: |
          mkdir -p android/build
          unzip -q "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_DIR}/android_source.zip" -d android/build
          echo "${GODOT_TEMPLATE_DIR}" > android/.build_version
          cat >> android/build/build.gradle <<'EOF'

          afterEvaluate {
              tasks.matching { it.name ==~ /process.*Manifest.*/ }.all { Task t ->
                  t.doLast {
                      project.fileTree(dir: project.buildDir, include: '**/AndroidManifest.xml').each { File f ->
                          String text = f.text
                          if (text.contains('android:resizeableActivity="true"')) {
                              f.text = text.replace('android:resizeableActivity="true"', 'android:resizeableActivity="false"')
                              println "[patch] resizeableActivity=false in ${f.canonicalPath}"
                          }
                      }
                  }
              }
          }
          EOF

      - name: Write stub Play Games Services games_strings.xml
        # The PGS plugin injects a manifest meta-data tag referencing
        # @string/game_services_project_id. Even debug builds need that
        # resource to exist or AAPT errors out. Use a numeric stub since
        # debug builds aren't shipping cloud sync — only release.yml
        # injects the real PGS_APP_ID from the secret.
        run: |
          mkdir -p android/build/src/main/res/values
          cat > android/build/src/main/res/values/games_strings.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="game_services_project_id" translatable="false">0</string>
          </resources>
          EOF

      - name: Import project
        run: godot --headless --path . --import 2>&1 | tail -10 || true

      - name: Export Android (debug)
        # Godot 4.6 reads keystore env vars directly; no editor_settings.tres
        # write needed.
        env:
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: ${{ github.workspace }}/debug.keystore
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android
        run: |
          mkdir -p exports/android
          godot --headless --path . --export-debug "Android" exports/android/IdleBeastPractices-debug.aab

      - uses: actions/upload-artifact@v4
        with:
          name: android-debug
          path: exports/android
